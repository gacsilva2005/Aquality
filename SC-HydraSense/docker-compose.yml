version: '3.9'

services:
  hydrasense-mysql:
    image: mysql:8
    container_name: hydrasense-mysql
    environment:
      MYSQL_ROOT_PASSWORD: tinCTrom
      MYSQL_DATABASE: hydrasense
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10


  backend:
    build:
      context: ./Back-End
    container_name: hydrasense-backend
    depends_on:
      hydrasense-mysql:
        condition: service_healthy
    restart: "no"
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./Front-End/sc-hydrasense-web
    container_name: hydrasense-frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data: